<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Bookmark</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 380px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      background: #18181b;
      color: #e4e4e7;
      padding: 16px;
    }

    h1 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 14px;
      color: #f4f4f5;
    }

    .field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }

    label { font-size: 11px; font-weight: 500; color: #a1a1aa; }

    input, textarea, select {
      background: #27272a;
      border: 1px solid #3f3f46;
      border-radius: 6px;
      color: #e4e4e7;
      font-size: 13px;
      padding: 7px 10px;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, textarea:focus, select:focus { border-color: #71717a; }
    textarea { resize: vertical; min-height: 60px; font-family: inherit; }

    .url-row { display: flex; gap: 6px; }
    .url-row input { flex: 1; }

    button {
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      padding: 7px 12px;
      transition: background 0.15s, opacity 0.15s;
    }
    button:disabled { opacity: 0.45; cursor: default; }

    .btn-analyze {
      background: #3f3f46;
      color: #e4e4e7;
      white-space: nowrap;
    }
    .btn-analyze:hover:not(:disabled) { background: #52525b; }

    .btn-add {
      background: #e4e4e7;
      color: #18181b;
      width: 100%;
      margin-top: 6px;
      padding: 9px;
      font-size: 13px;
    }
    .btn-add:hover:not(:disabled) { background: #f4f4f5; }

    .msg {
      font-size: 11px;
      margin-top: 8px;
      padding: 6px 8px;
      border-radius: 5px;
    }
    .msg.error { background: #450a0a; color: #fca5a5; }
    .msg.success { background: #052e16; color: #86efac; }

    #fields { display: none; }
    #fields.visible { display: block; }
  </style>
</head>
<body>
  <h1>Add Bookmark</h1>

  <div class="field">
    <label>URL</label>
    <div class="url-row">
      <input type="url" id="url" placeholder="https://…" />
      <button class="btn-analyze" id="analyzeBtn">Analyze</button>
    </div>
  </div>

  <div id="msg"></div>

  <div class="field" id="pasteField" style="display:none">
    <label>Paste post text</label>
    <textarea id="pasteText" rows="4" placeholder="Paste the post text here…"></textarea>
  </div>

  <div id="fields">
    <div class="field">
      <label>Title</label>
      <input type="text" id="title" />
    </div>

    <div class="field">
      <label>Summary</label>
      <textarea id="summary" rows="3"></textarea>
    </div>

    <div class="field">
      <label>Topics (comma-separated)</label>
      <input type="text" id="topics" placeholder="Machine Learning, Climate Change" />
    </div>

    <button class="btn-add" id="addBtn">Add bookmark</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
